name: GoogleTask
options:
  bundleIdPrefix: com.jk
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

schemes:
  GoogleTask:
    build:
      targets:
        GoogleTask: all
        GoogleTaskWidget: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
  GoogleTaskWidget:
    build:
      targets:
        GoogleTaskWidget: all
    run:
      config: Debug

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"

targets:
  GoogleTaskWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Widget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jk.googletaskonmac.widget
        SWIFT_VERSION: 5.9
        INFOPLIST_FILE: Widget/Info.plist
        SUPPORTS_MACCATALYST: YES
        TARGETED_DEVICE_FAMILY: "1,2,6"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Widget/GoogleTaskWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jk.googletaskonmac

  GoogleTask:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jk.googletaskonmac
        SWIFT_VERSION: 5.9
        INFOPLIST_FILE: Supporting/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: YES
        TARGETED_DEVICE_FAMILY: "1,2,6"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: GoogleSignIn
      - target: GoogleTaskWidget
    entitlements:
      path: Supporting/GoogleTask.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jk.googletaskonmac
